version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sk-epay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-modern_epay}
      POSTGRES_USER: ${POSTGRES_USER:-modern_epay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modern_epay_secure}
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modern_epay} -d ${POSTGRES_DB:-modern_epay}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sk-epay-net

  redis:
    image: redis:7-alpine
    container_name: sk-epay-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sk-epay-net

  api:
    image: node:20-alpine
    container_name: sk-epay-api
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "corepack enable && pnpm install && pnpm --filter api dev"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-modern_epay}:${POSTGRES_PASSWORD:-modern_epay_secure}@postgres:5432/${POSTGRES_DB:-modern_epay}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-secret}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      TZ: Asia/Shanghai
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    networks:
      - sk-epay-net

  web:
    image: node:20-alpine
    container_name: sk-epay-web
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "corepack enable && pnpm install && pnpm --filter web dev -- --hostname 0.0.0.0"]
    depends_on:
      api:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: ${WEB_PORT:-3001}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
      TZ: Asia/Shanghai
    ports:
      - "${WEB_PORT:-3001}:3001"
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
      - pnpm_store:/root/.local/share/pnpm/store
    networks:
      - sk-epay-net

volumes:
  postgres_data:
  redis_data:
  api_node_modules:
  web_node_modules:
  pnpm_store:

networks:
  sk-epay-net:
    driver: bridge
